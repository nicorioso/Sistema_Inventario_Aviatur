spring.application.name=sgia-backend
spring.profiles.default=local

server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never

spring.web.resources.add-mappings=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sgia_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:sgia_user}
spring.datasource.password=${DB_PASSWORD:sgia_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

app.security.admin.username=${ADMIN_USERNAME:}
app.security.admin.password=${ADMIN_PASSWORD:}
app.security.admin.password-encoded=${ADMIN_PASSWORD_ENCODED:false}
app.security.require-https=${SECURITY_REQUIRE_HTTPS:false}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
app.security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-XSRF-TOKEN}
app.security.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Location}
app.security.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.security.cors.max-age-seconds=${CORS_MAX_AGE_SECONDS:3600}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

info.app.name=SGIA Backend
info.app.description=Sistema de gestion de equipos de computo de Aviatur Medellin
info.app.version=@project.version@
