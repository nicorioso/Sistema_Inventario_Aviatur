spring.application.name=sgia-backend
spring.profiles.default=local

server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never

spring.web.resources.add-mappings=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sgia_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:sgia_user}
spring.datasource.password=${DB_PASSWORD:sgia_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

info.app.name=SGIA Backend
info.app.description=Sistema de gestion de equipos de computo de Aviatur Medellin
info.app.version=@project.version@
