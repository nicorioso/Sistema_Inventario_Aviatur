services:
  mysql:
    image: mysql:8.4
    container_name: sgia-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sgia_db}
      MYSQL_USER: ${MYSQL_USER:-sgia_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sgia_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
